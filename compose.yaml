name: open-design

services:
  open-design-daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    environment:
      OD_BIND_HOST: 0.0.0.0
      OD_DATA_DIR: /data
      OD_PORT: 7456
      OD_DEFAULT_MODE: ${OD_DEFAULT_MODE:-}
      OD_DEFAULT_API_PROTOCOL: ${OD_DEFAULT_API_PROTOCOL:-}
      OD_DEFAULT_API_BASE_URL: ${OD_DEFAULT_API_BASE_URL:-}
      OD_DEFAULT_API_MODEL: ${OD_DEFAULT_API_MODEL:-}
      OD_DEFAULT_ALLOW_LOCAL_API_BASE_URL: ${OD_DEFAULT_ALLOW_LOCAL_API_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7456:7456"
    restart: unless-stopped
    volumes:
      - open-design-data:/data

  open-design-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - open-design-daemon
    ports:
      - "7831:80"
    restart: unless-stopped

volumes:
  open-design-data: